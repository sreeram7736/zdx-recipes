# Editable Settings
# -----------------
# You can edit the following:

{{serverEndpoints}}

# Set Tags
sets tags "default, zdx, zdx scripts, official, cinematics"

# Optional Editable Settings
# --------------------------
# You may edit the following:

sv_licenseKey "{{svLicense}}"
sv_hostname "{{serverName}} | ZDX Scripts Server"
sets sv_projectName "{{serverName}} | [{{recipeName}}]"
sets sv_projectDesc "{{recipeDescription}}"
set mysql_connection_string "{{dbConnectionString}}"
load_server_icon zdxLogo.png
sv_maxclients {{maxClients}}
sets locale "root-AQ" 
sv_enforceGameBuild 3258
set resources_useSystemChat true

# System Administrators
# ---------------------
# Add system admins

add_principal group.admin group.user
add_ace group.admin command allow # allow all commands
add_ace group.admin command.quit deny # but don't allow quit
add_ace resource.zdx_core command.add_ace allow
add_ace resource.zdx_core command.add_principal allow
add_ace resource.zdx_core command.remove_principal allow
add_ace resource.zdx_core command.stop allow
{{addPrincipalsMaster}}

# pma-voice Config
# ----------------
setr voice_enableRadioAnim 1
setr voice_useNativeAudio true
setr voice_useSendingRangeOnly true

# security-convars
# ----------------
sv_enableNetworkedSounds false
sv_enableNetworkedScriptEntityStates false
sv_enableNetworkedPhoneExplosions false
sv_filterRequestControl 2

# ZDX Language (edit to change the language of ZDX Scripts)
# -----------------------------------------------------------
## Uncomment to set your own locale,
## if not, it will use the language you have selected in txAdmin.
#setr zdx:locale "en"

## Uncomment to owerride the identifier used by ZDX.
## By default, it uses the license identifier.
#setr zdx:identifier "license"

# illenium-appearance locale config
setr illenium-appearance:locale "en"

# Default & Standalone Resources
# ------------------------------
ensure chat
ensure hardcap
ensure oxmysql
ensure pma-voice
ensure ox_lib

# ZDX Core (includes zdx_core, es_extended bridge, zdx_multicharacter)
# ----------
ensure [core]

# OX Resources (must start after [core] — es_extended bridge is required)
# ----------
ensure ox_inventory

# Standalone & Addons
# ----------
ensure [standalone]
# ensure ZDX_SpiderCam
# ensure ZDX_scenedirector
# ensure ZDX_loadingscreen